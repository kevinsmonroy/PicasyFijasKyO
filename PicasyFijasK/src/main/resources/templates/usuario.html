<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Picas y Fijas - Registro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 450px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; color: #222; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"] { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="text"]:focus, input[type="email"]:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        button { background-color: #28a745; color: white; border: none; padding: 12px 15px; font-size: 16px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .footer-text { text-align: center; margin-top: 15px; font-size: 14px; color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 Registro de Jugador</h2>

    <form th:action="@{/usuarios/crear}" th:object="${usuario}" method="post">

        <div class="form-group">
            <label for="nombre">Nombre de Usuario / Nickname:</label>
            <input type="text"
                   id="nombre"
                   th:field="*{nombre}"
                   placeholder="Ej: Player_1"
                   required
                   autocomplete="off">
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   placeholder="ejemplo@correo.com"
                   required
                   autocomplete="off">
        </div>

        <div class="form-group">
            <label for="avatarUrl">URL del Avatar (Opcional):</label>
            <input type="text"
                   id="avatarUrl"
                   th:field="*{avatarUrl}"
                   placeholder="https://link-de-tu-imagen.com"
                   autocomplete="off">
        </div>

        <button type="submit">Guardar y Continuar</button>
    </form>

    <p class="footer-text">Proyecto PicasyFijasK - Unlibre</p>
</div>

</body>
</html>
